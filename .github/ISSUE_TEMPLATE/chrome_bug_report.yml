name: Chrome Bug Report
description: Report a bug on the Chrome extension
labels: ["bug", "chrome"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a Chrome issue. Please fill in as much detail as possible.

  - type: dropdown
    id: chrome-version
    attributes:
      label: Chrome Version
      description: Go to chrome://version to find this.
      options:
        - "130+"
        - "120–129"
        - "110–119"
        - "100–109"
        - "Other (specify below)"
    validations:
      required: true

  - type: input
    id: chrome-version-exact
    attributes:
      label: Exact Chrome Version (if known)
      placeholder: e.g. 131.0.6778.86

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      placeholder: e.g. 0.6.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Windows
        - Linux
        - ChromeOS
    validations:
      required: true

  - type: input
    id: ollama-model
    attributes:
      label: Ollama Model (if applicable)
      placeholder: e.g. llama3.2

  - type: input
    id: job-site
    attributes:
      label: Job Site / Form Type
      description: Which site or form type is affected?
      placeholder: e.g. company career page, applicant tracking system

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Navigate to a job application page
        2. Click the Offlyn Apply icon
        3. Click "Auto-Fill Form"
        4. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: "Right-click the extension icon → Inspect Popup, or go to chrome://extensions → Offlyn Apply → Service Worker to see background errors."
      render: shell

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: Drag and drop any relevant screenshots here.
