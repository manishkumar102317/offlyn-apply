name: Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe it in as much detail as you can.

  - type: textarea
    id: problem
    attributes:
      label: Problem / Motivation
      description: What problem does this solve? What are you trying to do that's currently difficult or impossible?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the behavior or feature you'd like to see.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you tried any workarounds or considered other approaches?

  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Autofill / Form Detection
        - Cover Letter Generation
        - Popup UI
        - Dashboard / Job Tracker
        - Onboarding
        - Settings
        - AI / Ollama Integration
        - Performance
        - Other
    validations:
      required: true
