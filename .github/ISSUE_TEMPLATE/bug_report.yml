name: Firefox Bug Report
description: Report a bug on the Firefox extension
labels: ["bug", "firefox"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report. Please fill in as much detail as possible.

  - type: input
    id: firefox-version
    attributes:
      label: Firefox Version
      placeholder: e.g. 124.0
    validations:
      required: true

  - type: input
    id: ollama-model
    attributes:
      label: Ollama Model
      placeholder: e.g. llama3.2
    validations:
      required: true

  - type: input
    id: extension-version
    attributes:
      label: Extension Version
      placeholder: e.g. 0.2.4
    validations:
      required: true

  - type: input
    id: job-site
    attributes:
      label: Job Site / Form
      description: Which site or form type is affected? (e.g. Workday, Greenhouse, Lever, plain HTML)
      placeholder: e.g. Workday

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Open a Workday job application
        2. Click "Autofill"
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: textarea
    id: console
    attributes:
      label: Console Errors
      description: Open DevTools (F12) → Console tab, copy any red errors here.
      render: shell
